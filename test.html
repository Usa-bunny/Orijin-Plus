<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Slider</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .slides {
            display: flex;
            height: 100%;
            transition: 0.7s;
        }

        .slide {
            min-width: 100%;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slide-controls {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #nextBtn, #prevBtn {
            cursor: pointer;
            background: transparent;
            font-size: 30px;
            border: none;
            padding: 10px;
            color: white;
            transition: opacity 0.3s;
        }

        #nextBtn:hover, #prevBtn:hover {
            opacity: 0.7;
        }

        #nextBtn:focus, #prevBtn:focus {
            outline: none;
        }
    </style>
<body>
    <div class="container">
        <div class="slides">
            <div class="slide">
                <img src="src/img/preview-1-1.png" alt="Slide 1">
            </div>
            <div class="slide">
                <img src="src/img/preview-2-1.png" alt="Slide 2">
            </div>
            <div class="slide">
                <img src="src/img/preview-3-1.png" alt="Slide 3">
            </div>
            <div class="slide">
                <img src="src/img/preview-4-1.png" alt="Slide 4">
            </div>
        </div>
        
        <div class="slide-controls">
            <button id="prevBtn">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button id="nextBtn">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
    
    <script>
        // Select DOM elements
        const slideContainer = document.querySelector('.container');
        const slides = document.querySelector('.slides');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');

        // Use let for variables that will change
        let slideElements = document.querySelectorAll('.slide');
        let index = 1;
        let slideId;
        const interval = 1000;

        // Function to get fresh slide elements (needed after cloning)
        const getSlides = () => document.querySelectorAll('.slide');

        // Clone first and last slides for infinite effect
        const firstClone = slideElements[0].cloneNode(true);
        const lastClone = slideElements[slideElements.length - 1].cloneNode(true);

        // Assign IDs to cloned elements
        firstClone.id = 'first-clone';
        lastClone.id = 'last-clone';

        // Append clones to slides
        slides.appendChild(firstClone);
        slides.prepend(lastClone);

        // Calculate slide width and set initial position
        const slideWidth = getSlides()[index].clientWidth;
        slides.style.transform = `translateX(${-slideWidth * index}px)`;

        // Auto-slide functionality
        const startSlide = () => {
            slideId = setInterval(() => {
                moveToNextSlide();
            }, interval);
        };

        // Move to next slide
        const moveToNextSlide = () => {
            const slides = getSlides();
            if (index >= slides.length - 1) return;
            
            index++;
            const slideWidth = slides[index].clientWidth;
            document.querySelector('.slides').style.transform = `translateX(${-slideWidth * index}px)`;
        };

        // Move to previous slide
        const moveToPreviousSlide = () => {
            const slides = getSlides();
            if (index <= 0) return;
            
            index--;
            const slideWidth = slides[index].clientWidth;
            document.querySelector('.slides').style.transform = `translateX(${-slideWidth * index}px)`;
        };

        // Handle infinite loop transitions
        slides.addEventListener('transitionend', () => {
            const slides = getSlides();
            
            if (slides[index].id === 'first-clone') {
                document.querySelector('.slides').style.transition = 'none';
                index = 1;
                const slideWidth = slides[index].clientWidth;
                document.querySelector('.slides').style.transform = `translateX(${-slideWidth * index}px)`;
            }
            
            if (slides[index].id === 'last-clone') {
                document.querySelector('.slides').style.transition = 'none';
                index = slides.length - 2;
                const slideWidth = slides[index].clientWidth;
                document.querySelector('.slides').style.transform = `translateX(${-slideWidth * index}px)`;
            }
            
            document.querySelector('.slides').style.transition = '0.7s';
        });

        // Event listeners for manual navigation
        nextBtn.addEventListener('click', moveToNextSlide);
        prevBtn.addEventListener('click', moveToPreviousSlide);

        // Pause on hover
        slideContainer.addEventListener('mouseenter', () => {
            clearInterval(slideId);
        });

        // Resume on mouse leave
        slideContainer.addEventListener('mouseleave', startSlide);

        // Start the slider
        startSlide();
    </script>
</body>
</html>
